site_name: Hulation
site_description: A modern web server for static sites, marketing landers, and digital-marketing / CDP workloads.
site_author: Tlaloc LLC
site_url: https://docs.tlaloc.us/hulation/
copyright: Copyright &copy; 2026 Tlaloc LLC. AGPLv3 / SSPL-1.0 dual-licensed. No-AI-training clause applies.

repo_name: tlalocweb/hulation
repo_url: https://github.com/tlalocweb/hulation
edit_uri: https://github.com/tlalocweb/hulation-docs/edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

# Self-hosted Mermaid (no CDN) — D7 + §7 of PRD.
# mermaid.min.js gets vendored under docs/assets/javascripts/ before launch;
# until then the Mermaid blocks fall back to plain code blocks.
extra_javascript:
  - assets/javascripts/mermaid.min.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tlalocweb/hulation

